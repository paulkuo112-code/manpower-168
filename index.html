<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>安裝師人力 / 動線規劃板</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#f4f5f7;
    --panel:#ffffff;
    --panel-2:#f5f6f8;
    --border:#e0e3e8;
    --text:#20242c;
    --muted:#6b7280;
    --line:#6F96A2;       /* Ocean Slate - morandi accent, was teal */
    --line-bg:#E7EEF0;
    --line-border:#B7CDD2;
    --warn:#A9776D;
    --warn-bg:#F1E6E2;
    --warn-border:#D9BFB6;
    --danger:#B15E52;
    --mono: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);height:100%;font-family:var(--sans);}
  ::-webkit-scrollbar{height:10px;width:10px;}
  ::-webkit-scrollbar-thumb{background:#c7cdd6;border-radius:6px;}
  ::-webkit-scrollbar-track{background:transparent;}

  .app{display:flex;flex-direction:column;height:100vh;}

  /* ---------- Top nav ---------- */
  .navbar{
    display:flex;align-items:flex-end;gap:6px;padding:12px 18px 0;background:var(--panel-2);
    border-bottom:1px solid var(--border);flex-shrink:0;
  }
  .navtab{
    padding:9px 18px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;
    background:#e7e9ec;border:1px solid var(--border);border-bottom:none;
    border-radius:10px 10px 0 0;position:relative;top:1px;
  }
  .navtab:hover{background:#eef0f2;color:var(--text);}
  .navtab.active{color:var(--line);background:var(--panel);border-color:var(--border);box-shadow:0 -2px 4px rgba(0,0,0,.04);}

  /* ---------- Header ---------- */
  .topbar{padding:12px 18px 10px;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0;}
  .titlerow{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
  .titlerow h1{font-size:16px;margin:0;font-weight:700;}
  .titlerow .sub{color:var(--muted);font-size:12px;}
  .stats{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;align-items:center;}
  .stat{background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12px;color:var(--muted);display:flex;gap:6px;align-items:center;}
  .stat b{color:var(--text);font-size:13px;}
  .stat.warn{border-color:var(--warn-border);background:var(--warn-bg);color:#7A4F45;}
  .stat.warn b{color:var(--warn);}
  .toolbar{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center;}
  .search{flex:1;min-width:160px;max-width:280px;background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 10px;font-size:13px;outline:none;}
  .search::placeholder{color:#a3a9b3;}
  .btn{background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 12px;font-size:12.5px;cursor:pointer;white-space:nowrap;}
  .btn:hover{border-color:#b7bec9;}
  .btn.primary{background:var(--line);border-color:var(--line);color:#fff;}
  .btn.primary:hover{background:#5C8189;}
  .save-indicator{font-size:11px;color:var(--muted);margin-left:auto;}
  .cloud-status{font-size:11px;font-weight:600;margin-left:10px;padding:2px 8px;border-radius:6px;}
  .cloud-status.ok{color:#1b6b3d;background:#e7f7ee;}
  .cloud-status.err{color:#a02323;background:#fdecec;}
  .cloud-status.off{color:var(--muted);background:var(--panel-2);}

  .vacancy-banner{margin-top:10px;background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:8px;padding:8px 12px;font-size:12.5px;color:#7A4F45;display:none;}
  .vacancy-banner.show{display:block;}
  .vacancy-banner b{color:var(--warn);}
  .vacancy-chip{display:inline-block;background:#EFE0D8;border:1px solid #D9BFB6;color:#7A4F45;border-radius:6px;padding:2px 7px;margin:3px 4px 0 0;font-size:11.5px;cursor:pointer;}
  .vacancy-chip:hover{background:#E6D2C8;}
  .vacancy-region{margin-top:8px;padding-top:8px;border-top:1px dashed var(--warn-border);}
  .vacancy-region:first-of-type{border-top:none;}
  .vacancy-region-name{font-size:12px;font-weight:700;margin-right:6px;}

  /* ---------- Board ---------- */
  .board{flex:1;display:flex;gap:12px;overflow-x:auto;overflow-y:hidden;padding:14px 18px 14px 26px;scroll-snap-type:x proximity;scroll-padding-left:26px;}
  .column{flex:0 0 264px;display:flex;flex-direction:column;background:var(--panel);border:1px solid var(--border);border-radius:12px;scroll-snap-align:start;max-height:100%;overflow:hidden;}
  .column.staging{border-style:dashed;border-color:#c7cdd6;background:#fafbfc;}
  .col-banner{height:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14.5px;font-weight:700;letter-spacing:.3px;padding:0 10px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .column.staging .col-banner{background:repeating-linear-gradient(45deg,#c7cdd6,#c7cdd6 6px,#dfe3e8 6px,#dfe3e8 12px)!important;color:#5a6472;}
  .col-head{padding:11px 12px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
  .col-title{font-weight:700;font-size:13.5px;}
  .col-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
  .col-pill{background:var(--panel-2);border:1px solid var(--border);border-radius:999px;padding:2px 8px;font-size:10.5px;color:var(--muted);white-space:nowrap;}
  .lock-row{margin-top:8px;}
  .lock-badge{display:inline-block;width:100%;text-align:center;font-size:11px;font-weight:700;border-radius:7px;padding:5px 6px;cursor:pointer;box-sizing:border-box;}
  .lock-badge.locked{background:#f0f1f3;color:#6b7280;border:1px dashed #c7cdd6;}
  .lock-badge.locked:hover{background:#e7e9ec;}
  .lock-badge.unlocked{background:#e7f7ee;color:#1b6b3d;border:1px solid #b7e6c9;}
  .lock-badge.unlocked:hover{background:#d9f0e4;}
  @keyframes lockShake{0%,100%{transform:translateX(0);}20%{transform:translateX(-4px);}40%{transform:translateX(4px);}60%{transform:translateX(-3px);}80%{transform:translateX(3px);}}
  .lock-badge.lock-shake{animation:lockShake .35s ease;}
  .col-body.col-locked{background:repeating-linear-gradient(45deg,#fafbfc,#fafbfc 10px,#f1f2f4 10px,#f1f2f4 20px);}
  .col-body{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;min-height:60px;}
  .col-body.drop-hover{background:var(--line-bg);outline:2px dashed var(--line);outline-offset:-4px;}
  .col-body.drop-blocked{background:#fdecec;outline:2px dashed var(--danger);outline-offset:-4px;cursor:not-allowed;}
  .col-empty-hint{color:#a3a9b3;font-size:11.5px;text-align:center;padding:14px 4px;border:1px dashed var(--border);border-radius:8px;}

  /* ---------- Group card ---------- */
  .group{border:1px solid var(--border);border-left:8px solid #ccc;border-radius:10px;padding:8px 9px;position:relative;transition:box-shadow .15s;background:#fff;}
  .group.dragging{opacity:0.35;}
  .group.drop-hover{box-shadow:0 0 0 2px var(--line) inset;}
  .group.drop-before{box-shadow:0 3px 0 0 var(--line) inset;}
  .group.drop-after{box-shadow:0 -3px 0 0 var(--line) inset;}
  .group.drop-merge{box-shadow:0 0 0 3px var(--warn) inset;background:var(--warn-bg)!important;}
  .group.drop-blocked, .installer-slot.drop-blocked{box-shadow:0 0 0 2px var(--danger) inset;background:#fdecec!important;cursor:not-allowed;}
  .group.dim{opacity:0.3;}
  .group-top{display:flex;align-items:center;gap:6px;}
  .handle{cursor:grab;color:#7b8695;font-size:19px;line-height:1;padding:5px 7px;touch-action:none;flex-shrink:0;border-radius:6px;
    -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
    -webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;}
  .handle:active{cursor:grabbing;background:var(--panel-2);}
  .handle:active{cursor:grabbing;}
  .colorswatch{width:14px;height:14px;border-radius:4px;flex-shrink:0;cursor:pointer;border:1px solid rgba(0,0,0,.15);}
  .glabel{flex:1;font-size:12px;font-weight:600;background:transparent;border:none;color:var(--text);outline:none;border-bottom:1px dashed transparent;padding:1px 0;min-width:0;}
  .glabel:focus{border-bottom-color:var(--line);}
  .gcount{font-size:10.5px;color:var(--muted);flex-shrink:0;}
  .group-del{font-size:12px;color:#c7cdd6;cursor:pointer;flex-shrink:0;padding:0 2px;}
  .group-del:hover{color:var(--danger);}

  .store-line{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--muted);margin-top:5px;padding:3px 5px;background:var(--panel-2);border-radius:6px;flex-wrap:wrap;touch-action:none;
    -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
    -webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;}
  .store-code{font-family:var(--mono);font-size:10.5px;color:#8b93a0;flex-shrink:0;}
  .store-name{color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .store-line.store-copy{background:#EEF1F6;border:1px dashed #A2B0CE;}
  .copy-badge{font-size:9px;font-weight:700;color:#4F6A99;background:#DDE4F3;border-radius:5px;padding:1px 6px;flex-shrink:0;white-space:nowrap;}
  .shared-route-note{width:100%;font-size:10px;color:#4F6A99;background:#EEF1F6;border:1px dashed #A2B0CE;border-radius:6px;padding:4px 7px;margin-top:6px;line-height:1.5;}
  .store-x{cursor:pointer;color:#a3a9b3;font-size:12px;flex-shrink:0;padding:0 2px;}
  .store-x:hover{color:var(--danger);}
  .perf-add{cursor:pointer;color:var(--line);font-size:10.5px;flex-shrink:0;}
  .perf-line{width:100%;font-size:10px;color:#8b93a0;padding-left:2px;}

  .installer-slot{margin-top:7px;border-top:1px dashed var(--border);padding-top:6px;min-height:30px;display:flex;flex-direction:column;gap:5px;}
  .installer-slot.drop-hover{background:var(--line-bg);border-radius:6px;}
  .installer-empty{font-size:11px;color:#a3a9b3;border:1px dashed #c7cdd6;border-radius:6px;padding:4px 8px;width:100%;text-align:center;}
  .installer-chip{display:flex;align-items:center;gap:6px;background:var(--line-bg);border:1px solid var(--line-border);border-radius:7px;padding:4px 7px;width:100%;}
  .installer-chip:active{cursor:grabbing;}
  .installer-chip.dragging{opacity:0.35;}
  .installer-chip .iname{font-size:12px;font-weight:600;color:#3F5D63;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .installer-chip .ititle{font-size:9.5px;color:#6F96A2;background:#DCE7E9;padding:1px 5px;border-radius:4px;flex-shrink:0;}
  .installer-chip .itenure{font-size:9.5px;color:#6F96A2;flex-shrink:0;}
  .installer-chip .ix{cursor:pointer;color:#7FA0A6;font-size:12px;padding:0 2px;flex-shrink:0;}
  .installer-chip .ix:hover{color:var(--danger);}
  .add-installer-btn{font-size:10.5px;color:var(--line);cursor:pointer;text-align:center;border:1px dashed var(--line-border);border-radius:6px;padding:3px;}
  .add-installer-btn:hover{background:var(--line-bg);}

  .loose-installer{background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:8px;padding:5px 8px;display:flex;align-items:center;gap:6px;}
  .loose-installer.dragging{opacity:0.35;}
  .loose-installer .iname{font-size:12px;font-weight:600;color:#7A4F45;flex:1;}
  .loose-installer .ititle{font-size:9.5px;color:#7A4F45;}
  .loose-installer .itenure{font-size:9.5px;color:#7A4F45;}
  .loose-tag{font-size:9.5px;color:#8C6B58;margin-left:2px;}
  .installer-note{font-size:9.5px;color:#8C6B58;width:100%;cursor:pointer;background:#F1E6E2;border-radius:5px;padding:2px 6px;margin-top:2px;}
  .installer-note:hover{background:#E6D2C8;}
  .note-add{font-size:9.5px;color:var(--line);cursor:pointer;width:100%;margin-top:2px;}
  .note-add:hover{text-decoration:underline;}

  .drag-ghost{position:fixed;z-index:9999;pointer-events:none;opacity:0.95;transform:translate(-50%,-50%);box-shadow:0 8px 24px rgba(0,0,0,.18);border-radius:10px;}

  .footer-hint{padding:8px 18px 12px;font-size:11px;color:#9aa1ab;text-align:center;flex-shrink:0;border-top:1px solid var(--border);}

  /* ---------- Overview / print view (org-chart style) ---------- */
  .overview-view{padding:24px 28px 60px;max-width:none;margin:0 auto;width:100%;overflow-y:auto;flex:1;min-width:0;}
  .ov-toolbar{display:flex;justify-content:flex-end;margin-bottom:16px;max-width:960px;margin-left:auto;margin-right:auto;}
  .ov-region{margin-bottom:26px;background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px 18px 26px;box-shadow:0 1px 4px rgba(0,0,0,.05);border-top-width:5px;max-width:100%;}
  .ov-region-title{display:flex;align-items:baseline;gap:10px;justify-content:center;margin-bottom:14px;flex-wrap:wrap;}
  .ov-region-title h2{margin:0;font-size:16px;}
  .ov-region-stats{font-size:11.5px;color:var(--muted);}
  .ov-region-perf-row{text-align:center;margin-bottom:8px;}
  .ov-combined{max-width:640px;margin:0 auto 30px;background:#EEF1F6;border:1.5px dashed #A2B0CE;border-radius:10px;padding:14px 18px;text-align:center;}
  .ov-combined-title{font-weight:700;font-size:13.5px;color:#4F6A99;margin-bottom:6px;}
  .ov-region-perf{font-size:12px;font-weight:700;color:#6F96A2;background:#e7eef0;border-radius:6px;padding:3px 10px;}
  .ov-loose{font-size:12px;color:var(--warn);text-align:center;margin:0 0 10px;}
  .ov-scroll{overflow-x:auto;padding-bottom:14px;max-width:100%;}

  .org-tree, .org-tree ul{
    display:flex; justify-content:center; list-style:none; margin:0; padding-top:24px; position:relative;
  }
  .org-tree{ justify-content:flex-start; padding-top:0; padding-left:10px; }
  .org-tree li{
    display:flex; flex-direction:column; align-items:center; position:relative; padding:20px 6px 0 6px;
  }
  .org-tree li::before, .org-tree li::after{
    content:''; position:absolute; top:0; right:50%; border-top:2px solid var(--tree-line,#c9ced5); width:50%; height:20px;
  }
  .org-tree li::after{ right:auto; left:50%; border-left:2px solid var(--tree-line,#c9ced5); }
  .org-tree li:only-child::after, .org-tree li:only-child::before{ display:none; }
  .org-tree li:only-child{ padding-top:0; }
  .org-tree li:first-child::before, .org-tree li:last-child::after{ border:0 none; }
  .org-tree li:last-child::before{ border-right:2px solid var(--tree-line,#c9ced5); border-radius:0 6px 0 0; }
  .org-tree li:first-child::after{ border-radius:6px 0 0 0; }
  .org-tree ul::before{
    content:''; position:absolute; top:0; left:50%; border-left:2px solid var(--tree-line,#c9ced5); width:0; height:20px;
  }
  .org-tree > li{ padding-top:0; }
  .org-tree > li::before, .org-tree > li::after{ display:none; }

  .org-node{
    display:inline-flex; flex-direction:column; align-items:center; gap:1px;
    border:1.5px solid var(--border); border-radius:8px; padding:5px 9px; background:#fff;
    min-width:68px; box-shadow:0 1px 3px rgba(0,0,0,.06); white-space:nowrap;
  }
  .org-root{ color:#fff; font-weight:700; font-size:13px; border:none; padding:8px 18px; box-shadow:0 2px 6px rgba(0,0,0,.12); }
  .org-route-label{ font-weight:700; font-size:11px; }
  .org-store{ font-weight:700; font-size:11px; }
  .org-inst{ font-size:10px; color:#3F5D63; font-weight:600; }
  .org-node.org-vacant{ border:1.5px dashed var(--warn-border); background:var(--warn-bg); }
  .org-node.org-vacant .org-inst{ color:var(--warn); }
  .org-code{ font-family:var(--mono); font-size:9px; color:var(--muted); font-weight:400; }
  .org-perf{ font-size:9.5px; color:#6F96A2; font-weight:600; }
  .org-copy-tag{ font-size:8.5px; font-weight:700; color:#4F6A99; background:#DDE4F3; border-radius:5px; padding:1px 5px; }

  @media print{
    .navbar, .ov-toolbar{display:none!important;}
    body, .app{background:#fff!important;}
    .overview-view{padding:0;}
    .org-tree, .org-node{ print-color-adjust:exact; -webkit-print-color-adjust:exact; }
    .ov-region{break-inside:avoid-page;}
  }


  .modal-overlay{position:fixed;inset:0;background:rgba(20,24,30,.35);display:flex;align-items:center;justify-content:center;z-index:10000;padding:20px;}
  .modal-box{background:#fff;border-radius:12px;padding:20px;max-width:380px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.25);}
  .modal-box h4{margin:0 0 8px;font-size:14.5px;}
  .modal-box p{margin:0 0 14px;font-size:12.5px;color:var(--muted);white-space:pre-wrap;line-height:1.6;}
  .modal-field{margin-bottom:10px;}
  .modal-field label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:3px;}
  .modal-field input{width:100%;border:1px solid var(--border);border-radius:7px;padding:7px 9px;font-size:13px;outline:none;}
  .modal-field input:focus{border-color:var(--line);}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;}

  /* ---------- Paste-import view ---------- */
  .paste-view{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:18px;max-width:840px;margin:0 auto;width:100%;}
  .paste-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
  .paste-card h3{margin:0 0 4px;font-size:14.5px;}
  .paste-card p{margin:2px 0 10px;font-size:12.5px;color:var(--muted);line-height:1.6;}
  .paste-format{background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-family:var(--mono);font-size:11.5px;color:#3a4048;margin-bottom:10px;white-space:pre-wrap;}
  .paste-textarea{width:100%;min-height:110px;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-family:var(--mono);font-size:12px;resize:vertical;outline:none;}
  .paste-textarea:focus{border-color:var(--line);}
  .paste-actions{display:flex;gap:8px;margin-top:8px;align-items:center;}
  .paste-result{font-size:12px;margin-top:8px;padding:8px 10px;border-radius:8px;display:none;white-space:pre-wrap;}
  .paste-result.ok{display:block;background:#e7f7ee;color:#1b6b3d;border:1px solid #b7e6c9;}
  .paste-result.err{display:block;background:#fdecec;color:#a02323;border:1px solid #f3c2c2;}
  .region-list{display:flex;flex-wrap:wrap;gap:6px;}
  .region-chip{display:inline-block;border:1.5px solid #ccc;border-radius:999px;padding:3px 10px;font-size:12px;font-weight:600;}
  .region-row{display:flex;align-items:center;gap:8px;padding:7px 2px;border-bottom:1px solid var(--border);}
  .region-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
  .region-row-name{flex:1;font-size:13px;font-weight:600;}
  .region-row-actions{display:flex;gap:12px;align-items:center;flex-shrink:0;}
  .region-link{font-size:11.5px;color:var(--line);cursor:pointer;white-space:nowrap;}
  .region-link:hover{text-decoration:underline;}
  .region-del{cursor:pointer;color:#c7cdd6;font-size:13px;}
  .region-del:hover{color:var(--danger);}
  .region-addstore-form{display:flex;gap:6px;padding:6px 2px 10px 19px;flex-wrap:wrap;align-items:center;}

  @media (max-width:640px){
    .column{flex:0 0 78vw;}
    .titlerow h1{font-size:15px;}
    .paste-view{padding:14px;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="navbar">
    <div class="navtab active" data-tab="board">動線規劃板</div>
    <div class="navtab" data-tab="overview">總覽頁（閱讀／列印用）</div>
    <div class="navtab" data-tab="paste">資料貼上（門市／安裝師／業績）</div>
  </div>

  <div id="view-board" style="display:flex;flex-direction:column;flex:1;min-height:0;">
    <div class="topbar">
      <div class="titlerow">
        <h1>🧭 安裝師人力 / 動線規劃板</h1>
        <span class="sub">拖曳門市卡片、安裝師卡片來重新分組動線</span>
      </div>
      <div class="stats" id="stats"></div>
      <div class="toolbar">

<script>
(function(){
  "use strict";

  // ============ Region + palette defs ============

    {id:'a1', name:'大北A區', color:'#CFA8B0'},

  const NEW_REGION_COLOR_PALETTE = ['#C6BBC6','#9CAEDB','#87A4BC','#A5C5C2','#C7D1D2','#90A7A5','#92ADAF','#D6C7D9','#B9A5BB','#C8B4D0','#D9CBE0','#BDAECF'];
  function allColumns(){ return state && state.regions ? [...state.regions, STAGE_DEF] : [STAGE_DEF]; }

  // 大北A區／大北B區 share installers, so cross-dragging between just these two is allowed;
  // every other pair of columns must stay strictly within its own column.
  const CROSS_ALLOWED_PAIRS = [['a1','a2']];
  function columnsLinked(colA, colB){
    if(colA===colB) return true;
    return CROSS_ALLOWED_PAIRS.some(([x,y])=> (x===colA&&y===colB)||(x===colB&&y===colA));
  }

  // ============ Per-column lock (accidental-drag protection) ============
  const LOCK_IDLE_MS = 5*60*1000; // 5 minutes
  let regionLocks={};
  function ensureLockEntry(colId){
    if(colId==='stage') return; // staging area is never locked
    if(!regionLocks[colId]) regionLocks[colId]={locked:true, timer:null};
  }
  function initLocks(){
    regionLocks={};
    if(state && state.regions) state.regions.forEach(r=>ensureLockEntry(r.id));
  }
  function isLocked(colId){
    if(colId==='stage') return false;
    ensureLockEntry(colId);
    return !!regionLocks[colId].locked;
  }
  function toggleLock(colId){
    if(colId==='stage') return;
    ensureLockEntry(colId);
    const st=regionLocks[colId];
    st.locked=!st.locked;
    clearTimeout(st.timer);
    if(!st.locked){
      st.timer=setTimeout(()=>{ st.locked=true; render(); }, LOCK_IDLE_MS);
    }
    render();
  }
  function touchLock(colId){
    if(colId==='stage') return;
    ensureLockEntry(colId);
    const st=regionLocks[colId];
    if(st.locked) return;
    clearTimeout(st.timer);
    st.timer=setTimeout(()=>{ st.locked=true; render(); }, LOCK_IDLE_MS);
  }
  function dragAllowed(homeCol, targetCol){
    if(!columnsLinked(homeCol, targetCol)) return false;
    if(isLocked(homeCol)) return false;
    if(isLocked(targetCol)) return false;
    return true;
  }

  const GROUP_PALETTE = [

      ['165','六甲頂門市','楊世丞','安裝師','11年160天'], ['167','東門門市','陳品宏','安裝師組長','15年243天'],
      ['172','虎尾門市','邱升塏','安裝師','1年248天'], ['181','和緯門市',null], ['185','南科善化門市',null]
    ],
    e1: [

      ['142','屏東門市','蔡松村','助理安裝師','0年22天'], ['154','博大門市','余孟翰','安裝師','6年174天'],
      ['164','夢時代門市','蔡易穎','安裝師','1年275天'], ['170','右昌門市','林天翔','安裝師','6年321天'],

    ],

  function buildInitialState(){
    let storeSeq=1, groupSeq=1, instSeq=1;
    const stores={}, groups=[], installers={};
    const regions=REGION_SEED.map(r=>({...r}));
    regions.forEach(region=>{
      (RAW[region.id]||[]).forEach(row=>{
        const [code,name,iname,title,tenure]=row;
        const sid='s'+(storeSeq++);
        stores[sid]={code,name,perf:null,homeRegion:region.id};
        const installerIds=[];
        const gid='g'+(groupSeq++);
        if(iname){
          const instId='i'+(instSeq++);
          installers[instId]={name:iname,title,tenure,location:{type:'group',groupId:gid}};
          installerIds.push(instId);
        }
        groups.push({id:gid,columnId:region.id,storeIds:[sid],installerIds,label:null,colorIdx:0});
      });
    });
    return {stores,groups,installers,regions,version:3};
  }

  // ============ State + persistence ============
  let state=null;
  let saveTimer=null;
  const saveIndicator=document.getElementById('saveIndicator');
  const STORAGE_KEY='install-planner-state';

  // ---- Supabase cloud sync (shared across all devices/browsers) ----
  const SUPABASE_URL='https://dsejdajfvubzsnberjog.supabase.co';
  const SUPABASE_KEY='sb_publishable_qkyDtG70PEs038XkDDv4uA_artiGy0y';
  let supabaseClient=null;
  try{
    if(window.supabase && window.supabase.createClient){
      supabaseClient=window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    }
  }catch(e){ supabaseClient=null; }

  let lastSyncedValue=null; // used to tell "my own save echoing back" apart from "someone else changed it"

  // Priority: Supabase (shared cloud, works across every device) > Claude's window.storage (this artifact only)
  // > browser localStorage (this browser only). Falls through automatically if a layer is unavailable.
  const storageAdapter = {
    async get(key){
      if(supabaseClient){
        try{
          const {data, error}=await supabaseClient.from('planner_data').select('payload').eq('id', key).maybeSingle();
          if(!error && data && data.payload){
            const value=JSON.stringify(data.payload);
            lastSyncedValue=value;
            return {key, value};
          }
        }catch(e){ /* fall through to local */ }
      }
      if(typeof window.storage!=='undefined' && window.storage && window.storage.get){
        return await window.storage.get(key, false);
      }
      try{
        const raw=localStorage.getItem(key);
        return raw ? {key, value:raw} : null;
      }catch(e){ return null; }
    },
    async set(key, value){
      if(supabaseClient){
        try{
          const {error}=await supabaseClient.from('planner_data').upsert({
            id:key, payload:JSON.parse(value), updated_at:new Date().toISOString()
          });
          if(!error){ lastSyncedValue=value; return {key, value}; }
        }catch(e){ /* fall through to local */ }
      }
      if(typeof window.storage!=='undefined' && window.storage && window.storage.set){
        return await window.storage.set(key, value, false);
      }
      try{
        localStorage.setItem(key, value);
        return {key, value};
      }catch(e){ return null; }
    }
  };

  function scheduleSave(){
    saveIndicator.textContent='儲存中...';
    clearTimeout(saveTimer);
    saveTimer=setTimeout(async ()=>{
      try{
        const ok=await storageAdapter.set(STORAGE_KEY, JSON.stringify(state));
        saveIndicator.textContent= ok ? (supabaseClient?'已同步到雲端 ☁️✓':'已自動儲存 ✓') : '儲存失敗（僅暫存於此頁）';
      }catch(e){ saveIndicator.textContent='儲存失敗（僅暫存於此頁）'; }
    }, 450);
  }

  function migrateIfNeeded(s){
    // migrate old single-installerId groups to installerIds array
    s.groups.forEach(g=>{
      if(g.installerId!==undefined){
        g.installerIds = g.installerId ? [g.installerId] : [];
        delete g.installerId;
      }
      if(!g.installerIds) g.installerIds=[];
      if(g.colorIdx===undefined) g.colorIdx=0;
    });
    Object.entries(s.stores).forEach(([sid,st])=>{
      if(st.perf===undefined) st.perf=null;
      if(!st.homeRegion){
        const g=s.groups.find(g=>g.storeIds.includes(sid));
        st.homeRegion = g ? g.columnId : 'stage';
      }
    });
    if(!s.regions){ s.regions=REGION_SEED.map(r=>({...r})); }
    return s;
  }

  async function loadState(){
    try{
      const res=await storageAdapter.get(STORAGE_KEY);
      if(res && res.value){
        state=migrateIfNeeded(JSON.parse(res.value));
        saveIndicator.textContent= supabaseClient ? '已從雲端載入最新資料 ☁️' : '已載入先前的排列';
        return;
      }
    }catch(e){ /* not found */ }
    state=buildInitialState();
    saveIndicator.textContent='已載入原始資料';
  }

  // Listen for changes made by *other* devices/tabs and pull them in live.
  function setupRealtimeSync(){
    if(!supabaseClient) return;
    try{
      supabaseClient
        .channel('planner_data_changes')
        .on('postgres_changes', {event:'*', schema:'public', table:'planner_data', filter:`id=eq.${STORAGE_KEY}`}, (payload)=>{
          const incoming=payload.new && payload.new.payload;
          if(!incoming) return;
          const incomingStr=JSON.stringify(incoming);
          if(incomingStr===lastSyncedValue) return; // this is just our own write echoing back
          lastSyncedValue=incomingStr;
          state=migrateIfNeeded(JSON.parse(incomingStr));
          render();
          if(document.getElementById('regionList')) renderRegionList();
          saveIndicator.textContent='📥 已同步其他裝置的最新更新';
        })
        .subscribe();
    }catch(e){ /* realtime not available, silent no-op — manual reload still gets latest via get() */ }
  }

  // ============ Custom modal (native confirm/prompt are blocked in sandboxed artifacts) ============
  function customConfirm(message){
    return new Promise(resolve=>{
      const overlay=document.createElement('div');
      overlay.className='modal-overlay';
      overlay.innerHTML=`
        <div class="modal-box">
          <p>${message}</p>
          <div class="modal-actions">
            <button class="btn" data-act="cancel">取消</button>
            <button class="btn primary" data-act="ok">確定</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
      function done(val){ overlay.remove(); resolve(val); }
      overlay.addEventListener('click', e=>{
        if(e.target===overlay) done(false);
        const act=e.target.closest('[data-act]');
        if(act) done(act.dataset.act==='ok');
      });
    });
  }
  function customPromptMulti(title, fields){
    // fields: [{key,label,value}]
    return new Promise(resolve=>{
      const overlay=document.createElement('div');
      overlay.className='modal-overlay';
      overlay.innerHTML=`
        <div class="modal-box">
          <h4>${title}</h4>
          ${fields.map(f=>`
            <div class="modal-field">
              <label>${f.label}</label>
              <input type="text" data-key="${f.key}" value="${(f.value||'').toString().replace(/"/g,'&quot;')}" />
            </div>`).join('')}
          <div class="modal-actions">
            <button class="btn" data-act="cancel">取消</button>
            <button class="btn primary" data-act="ok">儲存</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
      const firstInput=overlay.querySelector('input');
      if(firstInput) setTimeout(()=>firstInput.focus(), 0);
      function done(val){ overlay.remove(); resolve(val); }
      overlay.addEventListener('click', e=>{
        if(e.target===overlay) done(null);
        const act=e.target.closest('[data-act]');
        if(act){
          if(act.dataset.act==='cancel'){ done(null); return; }
          const result={};
          overlay.querySelectorAll('input[data-key]').forEach(inp=>{ result[inp.dataset.key]=inp.value; });
          done(result);
        }
      });
      overlay.addEventListener('keydown', e=>{
        if(e.key==='Enter'){ overlay.querySelector('[data-act="ok"]').click(); }
        if(e.key==='Escape'){ done(null); }
      });
    });
  }

  // ============ Helpers ============
  function regionOf(id){ return allColumns().find(r=>r.id===id); }
  function groupsInColumn(colId){ return state.groups.filter(g=>g.columnId===colId); }
  function looseInstallersInColumn(colId){
    return Object.entries(state.installers)
      .filter(([id,inst])=> inst.location.type==='column' && inst.location.columnId===colId)
      .map(([id])=>id);
  }
  function vacantGroups(){ return state.groups.filter(g=> g.installerIds.length===0 && g.storeIds.length>0); }
  function totalStores(){ return Object.keys(state.stores).length; }
  function totalInstallers(){ return Object.keys(state.installers).length; }
  function totalVacantStores(){ return vacantGroups().reduce((n,g)=>n+g.storeIds.length,0); }

  function titleColor(title){
    if(!title) return {tag:'#9aa1ab', bg:'#f0f1f3'};
    if(title.includes('組長')) return {tag:'#C08A5A', bg:'#f5ebe0'};       // 安裝師組長 - warm tan
    if(title.includes('助理')) return {tag:'#9E8CA6', bg:'#efe9f2'};      // 助理安裝師 - dusty purple
    return {tag:'#6F96A2', bg:'#e7eef0'};                                  // 安裝師 (regular) - ocean slate
  }
  function shortTitle(title){
    if(!title) return '';
    if(title.includes('組長')) return '組長';
    if(title.includes('助理')) return '助理';
    if(title.includes('安裝師')) return '安裝師';
    return title;
  }
  function titleSortRank(title){
    if(!title) return 3;
    if(title.includes('組長')) return 0;
    if(title.includes('助理')) return 2;
    return 1; // plain 安裝師 sits between 組長 and 助理
  }
  function sortTitleEntries(entries){
    return entries.sort((a,b)=> titleSortRank(a[0])-titleSortRank(b[0]) || a[0].localeCompare(b[0]));
  }
  function countByTitle(installerIds){
    const counts={};
    installerIds.forEach(id=>{
      const t=state.installers[id]?.title || '未分類';
      counts[t]=(counts[t]||0)+1;
    });
    return counts;
  }
  function titleCountsHtml(installerIds, asPills){
    const counts=countByTitle(installerIds);
    const entries=sortTitleEntries(Object.entries(counts));
    if(entries.length===0) return asPills ? '' : '0 位安裝師';
    if(asPills){
      return entries.map(([title,n])=>{
        const c=titleColor(title);
        return `<span class="col-pill" style="background:${c.bg};color:${c.tag};font-weight:700;">${title} ${n}</span>`;
      }).join('');
    }
    return entries.map(([title,n])=>`${title} <b>${n}</b>`).join('　');
  }
  function groupLabel(g){
    if(g.label) return g.label;
    const names=g.storeIds.map(sid=>state.stores[sid]?.name).filter(Boolean);
    if(names.length===0) return '（空群組）';
    if(names.length===1) return names[0];
    return names[0]+' 等'+names.length+'間門市';
  }
  // Groups a route's stores by their true home region. If this returns >1 key,
  // the route is a shared (cross-region) one — e.g. a 大北A店 merged with a 大北B店.
  function groupRegionBreakdown(g){
    const byRegion={};
    g.storeIds.forEach(sid=>{
      const s=state.stores[sid];
      if(!s) return;
      const home=s.homeRegion || g.columnId;
      (byRegion[home]=byRegion[home]||[]).push(s.name);
    });
    return byRegion;
  }
  function findStoreIdByCode(code){
    return Object.entries(state.stores).find(([id,s])=>s.code===code)?.[0] || null;
  }
  function findGroupContainingStore(storeId){
    return state.groups.find(g=>g.storeIds.includes(storeId));
  }

  // ============ Mutations ============
  function removeGroupIfEmpty(gid){
    const g=state.groups.find(x=>x.id===gid);
    if(g && g.storeIds.length===0 && g.installerIds.length===0 && !g.label){
      state.groups=state.groups.filter(x=>x.id!==gid);
    }
  }
  function mergeGroup(sourceId, targetId){
    if(sourceId===targetId) return;
    const src=state.groups.find(g=>g.id===sourceId);
    const tgt=state.groups.find(g=>g.id===targetId);
    if(!src||!tgt) return;
    tgt.storeIds=[...tgt.storeIds, ...src.storeIds];
    tgt.installerIds=[...tgt.installerIds, ...src.installerIds];
    src.installerIds.forEach(iid=>{ if(state.installers[iid]) state.installers[iid].location={type:'group',groupId:tgt.id}; });
    state.groups=state.groups.filter(g=>g.id!==sourceId);
  }
  // Moves a group to a column and/or a specific position, without merging it into another card.
  // refGroupId=null means "append to end of that column". Otherwise insert immediately before/after refGroupId.
  function insertGroupRelative(gid, colId, refGroupId, after){
    const idx=state.groups.findIndex(g=>g.id===gid);
    if(idx===-1) return;
    const [g]=state.groups.splice(idx,1);
    g.columnId=colId;
    if(refGroupId){
      let refIdx=state.groups.findIndex(x=>x.id===refGroupId);
      if(refIdx===-1){ state.groups.push(g); return; }
      if(after) refIdx+=1;
      state.groups.splice(refIdx,0,g);
    } else {
      state.groups.push(g);
    }
  }
  function extractStoreToNewGroup(storeId, fromGroupId, colId){
    const from=state.groups.find(g=>g.id===fromGroupId);
    if(!from) return;
    from.storeIds=from.storeIds.filter(s=>s!==storeId);
    const gid='g'+Date.now()+Math.floor(Math.random()*1000);
    state.groups.push({id:gid, columnId:colId, storeIds:[storeId], installerIds:[], label:null, colorIdx:0});
    removeGroupIfEmpty(from.id);
  }
  function moveStoreIntoGroup(storeId, fromGroupId, targetGroupId){
    if(fromGroupId===targetGroupId) return;
    const from=state.groups.find(g=>g.id===fromGroupId);
    const tgt=state.groups.find(g=>g.id===targetGroupId);
    if(!from||!tgt) return;
    from.storeIds=from.storeIds.filter(s=>s!==storeId);
    tgt.storeIds.push(storeId);
    removeGroupIfEmpty(from.id);
  }
  function assignInstallerToGroup(instId, groupId){
    const g=state.groups.find(x=>x.id===groupId);
    if(!g) return;
    if(g.installerIds.includes(instId)) return;
    // remove from wherever it currently is
    const oldGroup=state.groups.find(x=>x.installerIds.includes(instId));
    if(oldGroup) oldGroup.installerIds=oldGroup.installerIds.filter(i=>i!==instId);
    g.installerIds.push(instId);
    state.installers[instId].location={type:'group', groupId:g.id};
  }
  function unassignInstaller(instId, colId){
    const inst=state.installers[instId];
    if(!inst) return;
    const g=state.groups.find(x=>x.installerIds.includes(instId));
    let targetCol=colId;
    if(g){ g.installerIds=g.installerIds.filter(i=>i!==instId); targetCol=targetCol||g.columnId; }
    inst.location={type:'column', columnId: targetCol||'stage'};
  }
  function moveInstallerToColumn(instId, colId){
    const inst=state.installers[instId];
    if(!inst) return;
    const g=state.groups.find(x=>x.installerIds.includes(instId));
    if(g) g.installerIds=g.installerIds.filter(i=>i!==instId);
    inst.location={type:'column', columnId:colId};
  }
  function removeStoreFromGroupByClick(storeId, groupId){
    const g=state.groups.find(x=>x.id===groupId);
    if(!g || g.storeIds.length<=1) return;
    g.storeIds=g.storeIds.filter(s=>s!==storeId);
    const gid='g'+Date.now()+Math.floor(Math.random()*1000);
    state.groups.push({id:gid, columnId:g.columnId, storeIds:[storeId], installerIds:[], label:null, colorIdx:0});
  }
  function cycleGroupColor(gid){
    const g=state.groups.find(x=>x.id===gid);
    if(!g) return;
    g.colorIdx=((g.colorIdx||0)+1)%GROUP_PALETTE.length;
  }
  async function deleteGroup(gid){
    const g=state.groups.find(x=>x.id===gid);
    if(!g) return;
    if(g.storeIds.length>0 || g.installerIds.length>0){
      const ok=await customConfirm(`「${groupLabel(g)}」裡面還有 ${g.storeIds.length} 間門市、${g.installerIds.length} 位安裝師。\n刪除這個群組會把它們移到「空位區／暫存區」，不會刪掉門市或安裝師本身。確定要刪除嗎？`);
      if(!ok) return;
      g.storeIds.forEach(sid=>{
        const nid='g'+Date.now()+Math.floor(Math.random()*10000);
        state.groups.push({id:nid, columnId:'stage', storeIds:[sid], installerIds:[], label:null, colorIdx:0});
      });
      g.installerIds.forEach(iid=>{
        if(state.installers[iid]) state.installers[iid].location={type:'column', columnId:'stage'};
      });
    } else {
      const ok=await customConfirm(`確定要刪除「${groupLabel(g)}」這個空群組嗎？`);
      if(!ok) return;
    }
    state.groups=state.groups.filter(x=>x.id!==gid);
    render();
    scheduleSave();
  }
  async function addManualPerf(storeId){
    const s=state.stores[storeId];
    if(!s) return;
    const result=await customPromptMulti('編輯業績', [
      {key:'current', label:'當月業績', value:s.perf?.current||''},
      {key:'cumulative', label:'累計業績（例：1-6月業績）', value:s.perf?.cumulative||''},
      {key:'avg', label:'平均月業績', value:s.perf?.avg||''}
    ]);
    if(!result) return;
    s.perf={current:result.current, cumulative:result.cumulative, avg:result.avg};
    render();
    scheduleSave();
  }

  async function editInstallerNote(instId){
    const inst=state.installers[instId];
    if(!inst) return;
    const result=await customPromptMulti('編輯備註', [
      {key:'note', label:'備註（例：病假、休假中、暫調支援...）', value:inst.note||''}
    ]);
    if(!result) return;
    inst.note = result.note.trim() || null;
    render();
    scheduleSave();
  }

  // ============ Rendering: board ============
  const board=document.getElementById('board');
  const statsEl=document.getElementById('stats');
  const vacancyBanner=document.getElementById('vacancyBanner');
  let searchTerm='';

  function matchesSearch(g){
    if(!searchTerm) return true;
    const t=searchTerm.toLowerCase();
    if(groupLabel(g).toLowerCase().includes(t)) return true;
    for(const sid of g.storeIds){
      const s=state.stores[sid];
      if(s && (s.code.toLowerCase().includes(t) || s.name.toLowerCase().includes(t))) return true;
    }
    for(const iid of g.installerIds){
      const inst=state.installers[iid];
      if(inst && inst.name.toLowerCase().includes(t)) return true;
    }
    return false;
  }

  function render(){
    const allInstallerIds=Object.keys(state.installers);
    const titleBoxes=sortTitleEntries(Object.entries(countByTitle(allInstallerIds))).map(([title,n])=>{
      const c=titleColor(title);
      return `<div class="stat" style="border-color:${c.tag};background:${c.bg};"><span style="color:${c.tag};">${title}</span> <b style="color:${c.tag};">${n}</b></div>`;
    }).join('');
    statsEl.innerHTML=`
      <div class="stat">門市總數 <b>${totalStores()}</b></div>
      ${titleBoxes}
      <div class="stat">動線 / 群組數 <b>${state.groups.filter(g=>g.storeIds.length>0||g.label).length}</b></div>
    `;

    const vg=vacantGroups();
    if(vg.length){
      const byRegion={};
      vg.forEach(g=>{ (byRegion[g.columnId]=byRegion[g.columnId]||[]).push(g); });
      const sections=allColumns().filter(r=>byRegion[r.id]&&byRegion[r.id].length).map(r=>{
        const chips=byRegion[r.id].map(g=>`<span class="vacancy-chip" data-goto="${g.id}">${groupLabel(g)}</span>`).join('');
        return `<div class="vacancy-region"><span class="vacancy-region-name" style="color:${r.color}">${r.name}（${byRegion[r.id].length}）</span> ${chips}</div>`;
      }).join('');
      vacancyBanner.innerHTML = `<b>缺口清單：</b> 以下 ${vg.length} 個動線／門市尚未配安裝師（點擊可跳到該卡片）` + sections;
    } else {
      vacancyBanner.innerHTML = `<b>缺口清單：</b> 目前所有動線都已配置安裝師 🎉`;
    }

    board.innerHTML='';
    allColumns().forEach(region=>{
      const col=document.createElement('div');
      col.className='column'+(region.id==='stage'?' staging':'');
      col.dataset.colId=region.id;

      const groupsHere=groupsInColumn(region.id);
      const looseIds=looseInstallersInColumn(region.id);
      const withInstaller=groupsHere.filter(g=>g.installerIds.length>0).length;
      const assignedInstallerIds=groupsHere.reduce((arr,g)=>arr.concat(g.installerIds), []);
      const allRegionInstallerIds=assignedInstallerIds.concat(looseIds);

      const storeCount=Object.values(state.stores).filter(s=>s.homeRegion===region.id).length;
      const locked=isLocked(region.id);
      const lockRow = region.id==='stage' ? '' : `
        <div class="lock-row">
          <span class="lock-badge ${locked?'locked':'unlocked'}" data-toggle-lock="${region.id}">
            ${locked ? '🔒 已鎖定（點擊解鎖）' : '🔓 可編輯中・閒置5分鐘自動鎖定'}
          </span>
        </div>`;
      col.innerHTML=`
        <div class="col-banner" style="background:${region.color}">${region.name}</div>
        <div class="col-head">
          <div class="col-pills">
            ${region.id==='stage'
              ? `<span class="col-pill">拖放暫存／待補位</span>`
              : `<span class="col-pill">${storeCount} 間門市</span><span class="col-pill">${withInstaller} 條動線</span>${titleCountsHtml(allRegionInstallerIds, true)}<span class="col-pill">共 ${allRegionInstallerIds.length} 位</span><span class="col-pill">閒置 ${looseIds.length} 位</span>`}
          </div>
          ${lockRow}
        </div>
        <div class="col-body ${locked && region.id!=='stage' ? 'col-locked':''}" data-col-body="${region.id}"></div>
      `;
      board.appendChild(col);

      const body=col.querySelector('.col-body');
      let anyVisible=false;

      groupsHere.forEach(g=>{
        const visible=matchesSearch(g);
        if(visible) anyVisible=true;
        const card=renderGroup(g);
        if(!visible) card.classList.add('dim');
        body.appendChild(card);
      });

      looseIds.forEach(instId=>{
        anyVisible=true;
        body.appendChild(renderLooseInstaller(instId));
      });

      if(!anyVisible){
        const hint=document.createElement('div');
        hint.className='col-empty-hint';
        hint.textContent= region.id==='stage' ? '（空的）拖曳門市或安裝師到這裡暫放' : '（無符合項目）';
        body.appendChild(hint);
      }
    });

    attachDnD();
  }

  function renderGroup(g){
    const pal=GROUP_PALETTE[g.colorIdx||0];
    const card=document.createElement('div');
    card.className='group';
    card.dataset.groupId=g.id;
    card.style.background='#fff';
    card.style.borderLeftColor=pal.tag;

    const top=document.createElement('div');
    top.className='group-top';
    top.innerHTML=`
      <span class="handle" data-drag="group" data-id="${g.id}" title="拖曳搬動 / 合併">⠿</span>
      <span class="colorswatch" data-cycle-color="${g.id}" style="background:${pal.tag}" title="點一下換顏色（灰→玫瑰→薰衣草→藍灰→知更藍→海洋→海霧綠→梅子）"></span>
      <input class="glabel" value="${groupLabel(g)}" data-rename="${g.id}" />
      <span class="gcount">${g.storeIds.length>1? g.storeIds.length+'間門市':''}</span>
      <span class="group-del" data-delete-group="${g.id}" title="刪除這個群組">🗑</span>
    `;
    card.appendChild(top);

    const regionBreakdown=groupRegionBreakdown(g);
    const regionKeys=Object.keys(regionBreakdown);
    if(regionKeys.length>1){
      const note=document.createElement('div');
      note.className='shared-route-note';
      const parts=regionKeys.map(rid=>{
        const r=regionOf(rid);
        return `${r?r.name:rid}：${regionBreakdown[rid].join('、')}`;
      });
      note.innerHTML=`🔗 共用安裝師動線 — ${parts.join('　｜　')}`;

    }

    g.storeIds.forEach(sid=>{
      const s=state.stores[sid];
      if(!s) return;

      line.className='store-line'+(isCopy?' store-copy':'');

      line.innerHTML=`
        <span class="store-code">${s.code}</span>
        <span class="store-name">${s.name}</span>
        ${isCopy?`<span class="copy-badge" title="這間門市原本屬於${homeR?homeR.name:s.homeRegion}，此處為共用複製">複製・${homeR?homeR.name:''}</span>`:''}
        ${!s.perf? `<span class="perf-add" data-add-perf="${sid}">＋業績</span>`:''}
        ${g.storeIds.length>1?`<span class="store-x" data-split-store="${sid}" data-from-group="${g.id}" title="拆出獨立">✕</span>`:''}
        ${s.perf? `<span class="perf-line" data-edit-perf="${sid}">當月 ${s.perf.current||'-'}／累計 ${s.perf.cumulative||'-'}／月均 ${s.perf.avg||'-'}</span>`:''}
      `;

    const slot=document.createElement('div');
    slot.className='installer-slot';
    slot.dataset.slotForGroup=g.id;
    if(g.installerIds.length){
      g.installerIds.forEach(instId=>{
        const inst=state.installers[instId];
        if(!inst) return;
        const chip=document.createElement('div');
        chip.className='installer-chip';
        const tc=titleColor(inst.title);
        chip.innerHTML=`
          <span class="handle" data-drag="installer" data-id="${instId}" title="拖曳搬動">⠿</span>
          <span class="iname">${inst.name}</span>
          <span class="ititle" style="color:${tc.tag};background:${tc.bg};" title="${inst.title}">${shortTitle(inst.title)}</span>
          <span class="itenure">${inst.tenure}</span>
          <span class="ix" data-unassign="${instId}" title="移除安裝師">✕</span>
        `;
        slot.appendChild(chip);
      });
      const addMore=document.createElement('div');
      addMore.className='add-installer-btn';
      addMore.dataset.slotHintFor=g.id;
      addMore.textContent='拖曳安裝師到這裡可再加一位';
      slot.appendChild(addMore);
    } else {
      slot.innerHTML=`<div class="installer-empty">拖曳安裝師到這裡指派（可多位）</div>`;
    }
    card.appendChild(slot);
    return card;
  }

  // ============ Non-drag events ============
  document.getElementById('search').addEventListener('input', e=>{ searchTerm=e.target.value.trim(); render(); });
  document.getElementById('expandVacancy').addEventListener('click', ()=> vacancyBanner.classList.toggle('show'));

  board.addEventListener('click', e=>{
    const splitBtn=e.target.closest('[data-split-store]');
    if(splitBtn){ removeStoreFromGroupByClick(splitBtn.dataset.splitStore, splitBtn.dataset.fromGroup); render(); scheduleSave(); return; }

  vacancyBanner.addEventListener('click', e=>{
    const chip=e.target.closest('[data-goto]');

    const renameId=e.target.closest('[data-rename]');
    if(renameId){
      const g=state.groups.find(x=>x.id===renameId.dataset.rename);
      if(g){ g.label = renameId.value.trim() || null; scheduleSave(); }

  board.addEventListener('keydown', e=>{ if(e.key==='Enter' && e.target.matches('[data-rename]')) e.target.blur(); });

  // ============ Drag & drop ============
  function attachDnD(){
    board.querySelectorAll('[data-drag="group"]').forEach(handle=>{
      handle.onpointerdown=(e)=>startDrag(e,'group',handle.dataset.id, handle.closest('.group'));
    });
    board.querySelectorAll('[data-drag="installer"]').forEach(handle=>{
      handle.onpointerdown=(e)=>{ startDrag(e,'installer',handle.dataset.id, handle.closest('.installer-chip, .loose-installer')); };
    });
    board.querySelectorAll('.store-line').forEach(line=>{
      line.onpointerdown=(e)=>{
        if(e.target.closest('[data-split-store],[data-add-perf],[data-edit-perf]')) return;
        startDrag(e,'store', line.dataset.storeId, line, line.dataset.parentGroup);
      };
    });
  }

  function startDrag(e, type, id, sourceEl, extra){
    const homeCol=dragHomeColumn(type, id, extra);
    if(isLocked(homeCol)){
      flashLockHint(homeCol);
      return; // this region is locked — don't even begin dragging
    }
    e.preventDefault();
    const startX=e.clientX, startY=e.clientY;
    let started=false, ghost=null;

    function onMove(ev){
      const dx=ev.clientX-startX, dy=ev.clientY-startY;
      if(!started){
        if(Math.abs(dx)<6 && Math.abs(dy)<6) return;
        started=true;
        ghost=document.createElement('div');
        ghost.className='drag-ghost';
        ghost.style.width=sourceEl.offsetWidth+'px';
        ghost.innerHTML=sourceEl.outerHTML;
        document.body.appendChild(ghost);
        sourceEl.classList.add('dragging');
      }
      if(ghost){ ghost.style.left=ev.clientX+'px'; ghost.style.top=ev.clientY+'px'; }
      clearHoverStates();
      highlightTarget(type, ev, id, extra);
    }
    function onUp(ev){
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      if(ghost) ghost.remove();
      sourceEl.classList.remove('dragging');
      clearHoverStates();
      if(!started) return;
      handleDrop(type, id, extra, ev);
    }
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  }

  function flashLockHint(colId){
    const banner=board.querySelector(`.column[data-col-id="${colId}"] .lock-badge`);
    if(!banner) return;
    banner.classList.add('lock-shake');
    setTimeout(()=>banner.classList.remove('lock-shake'), 400);
  }

  function clearHoverStates(){ board.querySelectorAll('.drop-hover,.drop-before,.drop-after,.drop-merge,.drop-blocked').forEach(el=>el.classList.remove('drop-hover','drop-before','drop-after','drop-merge','drop-blocked')); }

  // Where does this dragged item currently "live"? Used to block any drop that would move it to a different column/region.
  function dragHomeColumn(type, id, extra){
    if(type==='group'){
      return state.groups.find(g=>g.id===id)?.columnId || null;
    }
    if(type==='installer'){
      const g=state.groups.find(g=>g.installerIds.includes(id));
      if(g) return g.columnId;
      return state.installers[id]?.location?.columnId || null;
    }
    if(type==='store'){
      return state.groups.find(g=>g.id===extra)?.columnId || null;
    }
    return null;
  }

  // For a group drag: top/bottom edge of a target card = reorder (insert before/after); middle of the card = merge into it.
  function groupHoverInfo(ev, draggedId){
    const under=document.elementFromPoint(ev.clientX, ev.clientY);
    if(!under) return null;
    const card=under.closest('.group');
    if(card && card.dataset.groupId!==draggedId){
      const rect=card.getBoundingClientRect();
      const relY=(ev.clientY-rect.top)/rect.height;
      let mode;
      if(relY<0.28) mode='before';
      else if(relY>0.72) mode='after';
      else mode='merge';
      return {refGroupId:card.dataset.groupId, mode, colId:card.closest('.col-body')?.dataset.colBody, cardEl:card};
    }
    const body=under.closest('.col-body');
    if(body) return {refGroupId:null, mode:'append', colId:body.dataset.colBody, cardEl:null};
    return null;
  }

  function highlightTarget(type, ev, id, extra){
    const under=document.elementFromPoint(ev.clientX, ev.clientY);
    if(!under) return;
    const homeCol=dragHomeColumn(type, id, extra);
    if(type==='group'){
      const info=groupHoverInfo(ev, id);
      if(info && !dragAllowed(homeCol, info.colId)){
        if(info.cardEl) info.cardEl.classList.add('drop-blocked');
        else { const b=board.querySelector(`[data-col-body="${info.colId}"]`); if(b) b.classList.add('drop-blocked'); }
        return;
      }
      if(info && info.cardEl){
        const cls = info.mode==='merge' ? 'drop-merge' : (info.mode==='after' ? 'drop-after' : 'drop-before');
        info.cardEl.classList.add(cls);
        return;
      }
      if(info){ const b=board.querySelector(`[data-col-body="${info.colId}"]`); if(b) b.classList.add('drop-hover'); }
    } else if(type==='installer'){
      const slot=under.closest('.installer-slot');
      const targetCol=slot ? slot.closest('.col-body')?.dataset.colBody : under.closest('.col-body')?.dataset.colBody;
      if(!dragAllowed(homeCol, targetCol)){
        if(slot) slot.classList.add('drop-blocked');
        else { const b=under.closest('.col-body'); if(b) b.classList.add('drop-blocked'); }
        return;
      }
      if(slot){ slot.classList.add('drop-hover'); return; }
      const b=under.closest('.col-body'); if(b) b.classList.add('drop-hover');
    } else if(type==='store'){
      const t=under.closest('.group');
      const targetCol=t ? t.closest('.col-body')?.dataset.colBody : under.closest('.col-body')?.dataset.colBody;
      if(!dragAllowed(homeCol, targetCol)){
        if(t) t.classList.add('drop-blocked');
        else { const b=under.closest('.col-body'); if(b) b.classList.add('drop-blocked'); }
        return;
      }
      if(t && t.dataset.groupId!==extra){ t.classList.add('drop-hover'); return; }
      const b=under.closest('.col-body'); if(b) b.classList.add('drop-hover');
    }
  }

  function handleDrop(type, id, extra, ev){
    const under=document.elementFromPoint(ev.clientX, ev.clientY);
    if(!under){ render(); return; }
    const homeCol=dragHomeColumn(type, id, extra);
    if(type==='group'){
      const info=groupHoverInfo(ev, id);
      if(info && dragAllowed(homeCol, info.colId)){
        if(info.mode==='merge') mergeGroup(id, info.refGroupId);
        else if(info.mode==='before') insertGroupRelative(id, info.colId, info.refGroupId, false);
        else if(info.mode==='after') insertGroupRelative(id, info.colId, info.refGroupId, true);
        else insertGroupRelative(id, info.colId, null, true);
        touchLock(homeCol); touchLock(info.colId);
      }
      // not allowed (different unlinked region, or locked) -> no-op, item stays put
    } else if(type==='installer'){
      const slot=under.closest('.installer-slot');
      const targetCol=slot ? slot.closest('.col-body')?.dataset.colBody : under.closest('.col-body')?.dataset.colBody;
      if(dragAllowed(homeCol, targetCol)){
        if(slot) assignInstallerToGroup(id, slot.dataset.slotForGroup);
        else { const b=under.closest('.col-body'); if(b) moveInstallerToColumn(id, b.dataset.colBody); }
        touchLock(homeCol); touchLock(targetCol);
      }
    } else if(type==='store'){
      const t=under.closest('.group');
      const targetCol=t ? t.closest('.col-body')?.dataset.colBody : under.closest('.col-body')?.dataset.colBody;
      if(dragAllowed(homeCol, targetCol)){
        if(t && t.dataset.groupId!==extra) moveStoreIntoGroup(id, extra, t.dataset.groupId);
        else { const b=under.closest('.col-body'); if(b) extractStoreToNewGroup(id, extra, b.dataset.colBody); }
        touchLock(homeCol); touchLock(targetCol);
      }
    }
    render();
    scheduleSave();
  }

  function hexToRgba(hex, alpha){
    hex = hex.replace('#','');
    const r=parseInt(hex.substring(0,2),16), g=parseInt(hex.substring(2,4),16), b=parseInt(hex.substring(4,6),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  function renderRouteNode(g, region){
    const vacant = g.installerIds.length===0;
    const instText = g.installerIds.length
      ? g.installerIds.map(iid=>state.installers[iid]?.name).filter(Boolean).join('、')
      : '缺';
    const borderStyle = vacant ? '' : `style="border-color:${hexToRgba(region.color,0.55)}"`;
    if(g.storeIds.length<=1){
      const s = g.storeIds.length ? state.stores[g.storeIds[0]] : null;
      const isCopy = s && s.homeRegion && s.homeRegion!==g.columnId;
      const perf = (s && s.perf) ? `<span class="org-perf">年度 ${s.perf.cumulative||'-'}</span>` : '';
      const copyTag = isCopy ? `<span class="org-copy-tag">複製・${regionOf(s.homeRegion)?.name||s.homeRegion}</span>` : '';
      return `
        <li>
          <div class="org-node ${vacant?'org-vacant':''}" ${borderStyle}>
            <span class="org-store">${s?s.name:groupLabel(g)}</span>
            ${s?`<span class="org-code">${s.code}</span>`:''}
            ${copyTag}
            ${perf}
            <span class="org-inst">${instText}</span>
          </div>
        </li>`;
    }
    const leaves = g.storeIds.map(sid=>{
      const s=state.stores[sid];
      if(!s) return '';
      const isCopy = s.homeRegion && s.homeRegion!==g.columnId;
      const copyTag = isCopy ? `<span class="org-copy-tag">複製・${regionOf(s.homeRegion)?.name||s.homeRegion}</span>` : '';
      const perf = (s.perf) ? `<span class="org-perf">年度 ${s.perf.cumulative||'-'}</span>` : '';
      return `<li><div class="org-node" style="border-color:${hexToRgba(region.color,0.4)}"><span class="org-store">${s.name}</span><span class="org-code">${s.code}</span>${copyTag}${perf}</div></li>`;
    }).join('');
    return `
      <li>
        <div class="org-node ${vacant?'org-vacant':''}" ${borderStyle}>
          <span class="org-route-label">${groupLabel(g)}</span>
          <span class="org-inst">${instText}</span>
        </div>
        <ul>${leaves}</ul>
      </li>`;
  }

  function parseNum(str){
    if(!str) return 0;
    const m=String(str).match(/^-?[\d,]+/);
    if(!m) return 0;
    return parseFloat(m[0].replace(/,/g,'')) || 0;
  }

  function renderOverview(){
    const sections = allColumns().map(region=>{
      const groups = groupsInColumn(region.id).filter(g=>g.storeIds.length>0);
      const looseIds = looseInstallersInColumn(region.id);
      const storeCount = Object.values(state.stores).filter(s=>s.homeRegion===region.id).length;
      if(groups.length===0 && looseIds.length===0 && storeCount===0) return '';
      const withInstaller = groups.filter(g=>g.installerIds.length>0).length;
      const regionInstallerIds = groups.reduce((arr,g)=>arr.concat(g.installerIds), []).concat(looseIds);

      let regionCumulative=0, regionAvg=0, hasPerf=false;
      Object.values(state.stores).filter(s=>s.homeRegion===region.id).forEach(s=>{
        if(s.perf){
          hasPerf=true;
          regionCumulative+=parseNum(s.perf.cumulative);
          regionAvg+=parseNum(s.perf.avg);
        }
      });
      const fmt=n=>Math.round(n).toLocaleString('en-US');
      const perfHtml = hasPerf ? `<span class="ov-region-perf">年度合計 ${fmt(regionCumulative)}／月均合計 ${fmt(regionAvg)}</span>` : '';

      const looseHtml = looseIds.length
        ? `<div class="ov-loose">待指派安裝師：${looseIds.map(iid=>{const i=state.installers[iid]; if(!i) return ''; return i.note? `${i.name}（${i.note}）` : i.name;}).filter(Boolean).join('、')}</div>`
        : '';

      const treeHtml = groups.length ? `
        <div class="ov-scroll" style="--tree-line:${region.color}">
          <ul class="org-tree">
            <li>
              <div class="org-node org-root" style="background:${hexToRgba(region.color,0.18)};border:1.5px solid ${region.color};color:var(--text);">${region.name}</div>
              <ul>${groups.map(g=>renderRouteNode(g,region)).join('')}</ul>
            </li>
          </ul>
        </div>` : '';

      let combinedHtml='';
      if(region.id==='a2'){
        // 大北A區＋大北B區 share installers — show a combined summary right after both individual sections
        const a1stores=Object.values(state.stores).filter(s=>s.homeRegion==='a1');
        const a2stores=Object.values(state.stores).filter(s=>s.homeRegion==='a2');
        const combinedStoreCount=a1stores.length+a2stores.length;
        const combinedGroups=groupsInColumn('a1').concat(groupsInColumn('a2')).filter(g=>g.storeIds.length>0);
        const combinedWithInstaller=combinedGroups.filter(g=>g.installerIds.length>0).length;
        const combinedInstallerIds=combinedGroups.reduce((arr,g)=>arr.concat(g.installerIds),[])
          .concat(looseInstallersInColumn('a1')).concat(looseInstallersInColumn('a2'));
        let combCumulative=0, combAvg=0, combHasPerf=false;
        a1stores.concat(a2stores).forEach(s=>{
          if(s.perf){ combHasPerf=true; combCumulative+=parseNum(s.perf.cumulative); combAvg+=parseNum(s.perf.avg); }
        });
        combinedHtml = `
          <div class="ov-combined">
            <div class="ov-combined-title">🔗 大北A＋大北B 合計（安裝師共用人力池）</div>
            <div class="ov-region-stats">${combinedStoreCount} 間門市・${combinedWithInstaller}/${combinedGroups.length} 條動線已配置安裝師・${titleCountsHtml(combinedInstallerIds, false)}</div>
            ${combHasPerf ? `<div class="ov-region-perf-row"><span class="ov-region-perf">年度合計 ${fmt(combCumulative)}／月均合計 ${fmt(combAvg)}</span></div>` : ''}
          </div>`;
      }

      return `
        <div class="ov-region" style="border-top-color:${region.color};">
          <div class="ov-region-title">
            <h2>${region.name}</h2>
            <span class="ov-region-stats">${storeCount} 間門市・${withInstaller}/${groups.length} 條動線已配置安裝師・${titleCountsHtml(regionInstallerIds, false)}</span>
          </div>
          ${perfHtml ? `<div class="ov-region-perf-row">${perfHtml}</div>` : ''}
          ${looseHtml}
          ${treeHtml}
        </div>
        ${combinedHtml}`;
    }).join('');

    viewOverview.innerHTML = `
      <div class="ov-toolbar"><button class="btn" id="ovPrintBtn">🖨️ 列印／存成 PDF</button></div>
      ${sections || '<p style="color:var(--muted);text-align:center;">目前還沒有任何門市資料。</p>'}
    `;
    const printBtn=document.getElementById('ovPrintBtn');
    if(printBtn) printBtn.onclick=()=>window.print();
  }

  function regionListClickHandler(e){
    const toggle=e.target.closest('[data-toggle-addstore]');
    if(toggle){
      const form=document.getElementById('addstore-'+toggle.dataset.toggleAddstore);
      if(form) form.style.display = (form.style.display==='none'||!form.style.display) ? 'flex' : 'none';
      return;
    }
    const submit=e.target.closest('[data-submit-addstore]');
    if(submit){
      const rid=submit.dataset.submitAddstore;
      const codeInput=document.querySelector(`[data-store-code="${rid}"]`);
      const nameInput=document.querySelector(`[data-store-name="${rid}"]`);
      doAddStoreQuick(rid, codeInput?codeInput.value:'', nameInput?nameInput.value:'');
      return;
    }
    const del=e.target.closest('[data-delete-region]');
    if(del){ doDeleteRegion(del.dataset.deleteRegion); return; }

  function doAddStoreQuick(regionId, codeRaw, nameRaw){
    const code=(codeRaw||'').trim(), name=(nameRaw||'').trim();
    if(!code||!name){ showResult('resultRegion', false, '請輸入門市代號與門市名稱。'); return; }
    const region=state.regions.find(r=>r.id===regionId);
    if(!region) return;
    const existingId=findStoreIdByCode(code);
    if(existingId){
      state.stores[existingId].name=name;
      showResult('resultRegion', true, `門市代號「${code}」已經存在，已把名稱更新為「${name}」。`);
    } else {
      const sid='s'+Date.now()+Math.floor(Math.random()*10000);
      state.stores[sid]={code, name, perf:null, homeRegion:region.id};
      const gid='g'+Date.now()+Math.floor(Math.random()*10000);
      state.groups.push({id:gid, columnId:region.id, storeIds:[sid], installerIds:[], label:null, colorIdx:0});
      showResult('resultRegion', true, `已把「${code} ${name}」加進「${region.name}」了。`);
    }
    render();
    scheduleSave();
  }

  async function doDeleteRegion(regionId){
    const region=state.regions.find(r=>r.id===regionId);
    if(!region) return;
    const groupsHere=state.groups.filter(g=>g.columnId===regionId);
    const storeCount=groupsHere.reduce((n,g)=>n+g.storeIds.length,0);
    const msg = storeCount>0
      ? `「${region.name}」裡面還有 ${storeCount} 間門市。刪除這個區域會把裡面的門市和動線都移到「空位區／暫存區」，不會刪掉門市或安裝師本身。確定要刪除嗎？`
      : `確定要刪除「${region.name}」這個區域嗎？`;
    const ok=await customConfirm(msg);
    if(!ok) return;
    groupsHere.forEach(g=>{ g.columnId='stage'; });
    state.regions=state.regions.filter(r=>r.id!==regionId);
    renderRegionList();
    render();
    scheduleSave();
  }

  function doAddRegion(){
    const input=document.getElementById('newRegionName');
    const name=input.value.trim();
    if(!name){ showResult('resultRegion', false, '請輸入區域名稱。'); return; }
    if(state.regions.some(r=>r.name===name)){ showResult('resultRegion', false, `「${name}」已經存在了，不需要重複新增。`); return; }
    const color=NEW_REGION_COLOR_PALETTE[state.regions.length % NEW_REGION_COLOR_PALETTE.length];
    const id='r'+Date.now()+Math.floor(Math.random()*10000);
    state.regions.push({id, name, color});
    ensureLockEntry(id);
    input.value='';
    renderRegionList();
    // refresh the store-paste instructions so the new region name is included, and refresh the board

    }
    render();
    scheduleSave();
    showResult('resultRegion', true, `已新增區域「${name}」，看板最右邊（空位區之前）已經出現這個新分區，可以直接用②門市資料貼上功能把門市加進去了。`);
  }

  function splitRows(text){
    return text.split('\n').map(l=>l.replace(/\r$/,'')).filter(l=>l.trim().length>0)
      .map(l=> l.includes('\t') ? l.split('\t') : l.split(/\s{2,}/))
      .map(cols=>cols.map(c=>c.trim()));
  }
  function showResult(elId, ok, msg){
    const el=document.getElementById(elId);
    el.className='paste-result '+(ok?'ok':'err');
    el.textContent=msg;
  }

  function doPasteStores(){
    const rows=splitRows(document.getElementById('pasteStores').value);
    if(!rows.length){ showResult('resultStores', false, '沒有偵測到任何資料列。'); return; }
    let added=0, updated=0; const errs=[];
    rows.forEach((cols,i)=>{
      let regionName, code, name;
      if(cols.length>=3){
        [regionName, code, name]=cols;
      } else if(cols.length===2){
        regionName=cols[0];
        const m=cols[1].match(/^(\d{2,4})(.+)$/);
        if(!m){ errs.push(`第${i+1}列「${cols[1]}」看不出代號＋名稱，格式應為代號緊接名稱，例如 016建國門市`); return; }
        code=m[1]; name=m[2];
      } else {
        errs.push(`第${i+1}列欄位不足`); return;
      }
      if(!regionName||!code||!name){ errs.push(`第${i+1}列欄位不足`); return; }
      const region=state.regions.find(r=>r.name===regionName.trim());
      if(!region||region.id==='stage'){ errs.push(`第${i+1}列「${regionName}」不是有效區域名稱`); return; }
      const existingId=findStoreIdByCode(code.trim());
      if(existingId){
        state.stores[existingId].name=name.trim();
        updated++;
      } else {
        const sid='s'+Date.now()+Math.floor(Math.random()*10000)+i;
        state.stores[sid]={code:code.trim(), name:name.trim(), perf:null, homeRegion:region.id};
        const gid='g'+Date.now()+Math.floor(Math.random()*10000)+i;
        state.groups.push({id:gid, columnId:region.id, storeIds:[sid], installerIds:[], label:null, colorIdx:0});
        added++;
      }
    });
    render(); scheduleSave();
    showResult('resultStores', errs.length===0, `完成：新增 ${added} 筆、更新 ${updated} 筆。${errs.length? '\n有問題的列：\n'+errs.join('\n') : ''}`);
  }

  function findInstallerIdByName(name){
    return Object.entries(state.installers).find(([id,inst])=>inst.name===name)?.[0] || null;
  }

  function doPasteInstallers(){
    const rows=splitRows(document.getElementById('pasteInstallers').value);
    if(!rows.length){ showResult('resultInstallers', false, '沒有偵測到任何資料列。'); return; }
    let added=0, updated=0; const errs=[];
    rows.forEach((cols,i)=>{
      const [regionName, name, title, tenure]=cols;
      if(!regionName||!name){ errs.push(`第${i+1}列欄位不足`); return; }
      const region=state.regions.find(r=>r.name===regionName.trim());
      if(!region){ errs.push(`第${i+1}列「${regionName}」不是有效區域名稱`); return; }
      const trimmedName=name.trim();
      const existingId=findInstallerIdByName(trimmedName);
      if(existingId){
        state.installers[existingId].title=(title||state.installers[existingId].title).trim();
        state.installers[existingId].tenure=(tenure||state.installers[existingId].tenure).trim();
        updated++;
      } else {
        const instId='i'+Date.now()+Math.floor(Math.random()*10000)+i;
        state.installers[instId]={name:trimmedName, title:(title||'安裝師').trim(), tenure:(tenure||'').trim(), location:{type:'column', columnId:region.id}};
        added++;
      }
    });
    render(); scheduleSave();
    showResult('resultInstallers', errs.length===0,
      `完成：新增 ${added} 位、更新 ${updated} 位安裝師。新增的人會先出現在對應區域最下面的待指派位置，記得手動拖到門市/動線卡片上。${errs.length? '\n有問題的列：\n'+errs.join('\n') : ''}`);
  }

  function monthNum(label){
    const m=label.match(/^(\d{1,2})/);
    return m ? parseInt(m[1],10) : 999; // 年度 sorts last
  }

  function doPastePerf(){
    const text=document.getElementById('pastePerf').value;
    const lines=text.split('\n').map(l=>l.replace(/\r$/,''));
    const perfByCode={};
    let skipped=0;
    lines.forEach(line=>{
      if(!line.trim()) return;
      const cols=line.split('\t').map(c=>c.trim()).filter(c=>c!=='');
      if(cols.length<3){ skipped++; return; }
      const monthLabel=cols[0];
      const nameCol=cols[1];
      const amountStr=cols[cols.length-1];
      const m=nameCol.match(/^(\d{2,4})/);
      if(!m){ skipped++; return; }
      const code=m[1];
      const amount=parseFloat(amountStr.replace(/[,\s]/g,''));
      if(isNaN(amount)){ skipped++; return; }
      if(!perfByCode[code]) perfByCode[code]={months:{}, annual:null, name:nameCol};
      if(monthLabel==='年度'){
        if(perfByCode[code].annual===null) perfByCode[code].annual=amount;
      } else if(!(monthLabel in perfByCode[code].months)){
        perfByCode[code].months[monthLabel]=amount;
      }
    });

    let updated=0; const errs=[];
    const fmt=n=>Math.round(n).toLocaleString('en-US');
    Object.entries(perfByCode).forEach(([code,data])=>{
      const sid=findStoreIdByCode(code);
      if(!sid){ errs.push(`找不到門市代號「${code}」（${data.name}）`); return; }
      const monthEntries=Object.entries(data.months).sort((a,b)=>monthNum(a[0])-monthNum(b[0]));
      if(monthEntries.length===0 && data.annual===null) return;
      const sum=monthEntries.reduce((s,[,v])=>s+v,0);
      const current= monthEntries.length ? monthEntries[monthEntries.length-1][1] : (data.annual||0);
      const lastLabel= monthEntries.length ? monthEntries[monthEntries.length-1][0] : '';
      const cumulative= data.annual!==null ? data.annual : sum;
      // 月均排除最後一個月（視為當月未滿一整月，例如 1-7月資料中的 7月），只用完整月份計算
      const fullMonths = monthEntries.length>1 ? monthEntries.slice(0, -1) : monthEntries;
      const fullSum = fullMonths.reduce((s,[,v])=>s+v,0);
      const avg = fullMonths.length ? fullSum/fullMonths.length : cumulative;
      const avgLabel = fullMonths.length>1 ? `${fullMonths[0][0]}-${fullMonths[fullMonths.length-1][0]}` : (fullMonths.length===1 ? fullMonths[0][0] : '');
      state.stores[sid].perf={
        current: fmt(current)+(lastLabel?`（${lastLabel}）`:''),
        cumulative: fmt(cumulative),
        avg: fmt(avg)+(avgLabel?`（${avgLabel}均）`:'')
      };
      updated++;
    });
    render(); scheduleSave();
    showResult('resultPerf', errs.length===0,
      `完成：更新 ${updated} 間門市的業績資料。${skipped? `（略過 ${skipped} 列格式不完整或重複資料）` : ''}${errs.length? '\n找不到對應門市代號：\n'+errs.join('\n') : ''}`);
  }

  // ============ Backup export / import ============
  function doExportBackup(){
    const blob=new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const ts=new Date().toISOString().slice(0,10).replace(/-/g,'');
    a.href=url;
    a.download=`安裝師動線備份_${ts}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    showResult('resultBackup', true, '已匯出備份檔案，請到瀏覽器的下載項目裡確認。');
  }

  function doImportBackupFile(file){
    const reader=new FileReader();
    reader.onload=(e)=>{
      try{
        const parsed=JSON.parse(e.target.result);
        if(!parsed || !parsed.stores || !parsed.groups){ throw new Error('missing fields'); }
        state=migrateIfNeeded(parsed);
        render();
        renderRegionList();
        scheduleSave();
        showResult('resultBackup', true, '備份還原成功，畫面已經更新成備份裡的資料。');
      }catch(err){
        showResult('resultBackup', false, '這個檔案看起來不是有效的備份格式，還原失敗。');
      }
    };
    reader.onerror=()=>{ showResult('resultBackup', false, '讀取檔案失敗，請再試一次。'); };
    reader.readAsText(file);
  }

  // Explicit, visible cloud-connection diagnostic (so problems can be spotted without dev tools)
  async function checkCloudStatus(){
    const el=document.getElementById('cloudStatus');
    if(!el) return;
    if(!supabaseClient){
      el.textContent='⚠️ 未接雲端資料庫（目前用本機儲存，換裝置不會同步）';
      el.className='cloud-status off';
      return;
    }
    try{
      const {error}=await supabaseClient.from('planner_data').select('id').limit(1);
      if(error){
        el.textContent='⚠️ 雲端連線失敗：'+error.message;
        el.className='cloud-status err';
      } else {
        el.textContent='☁️ 雲端同步中（跨裝置共用）';
        el.className='cloud-status ok';
      }
    }catch(e){
      el.textContent='⚠️ 雲端連線失敗：'+(e && e.message ? e.message : String(e));
      el.className='cloud-status err';
    }
  }

  // ============ Boot ============
  function showFatalError(err){
    const msg = (err && err.message) ? err.message : String(err);
    const el=document.createElement('div');
    el.style.cssText='position:fixed;top:0;left:0;right:0;z-index:99999;background:#fdecec;color:#a02323;padding:14px 18px;font-size:13px;border-bottom:2px solid #f3c2c2;font-family:sans-serif;';
    el.textContent='⚠️ 程式發生錯誤，請截圖這行文字回報：'+msg;
    document.body.prepend(el);
  }
  window.addEventListener('error', e=>showFatalError(e.error||e.message));

  (async function init(){
    try{
      await loadState();
      initLocks();
      render();
      buildPasteView();
      setupRealtimeSync();
      checkCloudStatus();
    }catch(err){
      showFatalError(err);
    }
  })();

})();
</script>
